[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Supabase Edge Functions
[[edge_functions]]
  function = "send-contact-email"
  path = "/api/send-contact-email"

[[edge_functions]]
  function = "send-quote-email"
  path = "/api/send-quote-email"

[[edge_functions]]
  function = "send-application-email"
  path = "/api/send-application-email"